        <body>
		<div class="container text-center">
			<div class="row">
				<div class="col-sm-2 col-md-4 myblock">Колонка</div>
				<div class="col-sm-2 col-md-4 myblock">Колонка</div>
				<div class="col-sm-2 col-md-4 myblock">Колонка</div>

		<!-- container

         <h1>Форма регистрации</h1>
			<div class="container">
				<div class="row">
					<form method="post" action="" name="form_reg" id="form_reg">
						<div class="mb-3">
							<label for="fam" class="form-label">Фамилия</label>
							<input
								type="text"
								class="form-control"
								id="fam"
								name="fam"
							/>
						</div>
						<div class="mb-3">
							<label for="name" class="form-label">Имя</label>
							<input
								type="text"
								class="form-control"
								id="name"
								name="name"
							/>
						</div>
						<div class="mb-3">
							<label for="ote" class="form-label">Отчество</label>
							<input
								type="text"
								class="form-control"
								id="ote"
								name="ote"
							/>
						</div>
						<div class="mb-3">
							<label for="pochta" class="form-label">Почта</label>
							<input
								type="email"
								class="form-control"
								id="pochta"
								name="pochta"
							/>
						</div>
						<div class="mb-3">
							<label for="phone" class="form-label">Телефон</label>
							<input
								type="tel"
								class="form-control"
								id="phone"
								name="phone"
							/>
						</div>
						<div class="mb-3">
							<label for="login" class="form-label">Логин</label>
							<input
								type="text"
								class="form-control"
								id="login"
								name="login"
							/>
						</div>
						<div class="mb-3">
							<label for="pass" class="form-label">Пароль</label>
							<input
								type="password"
								class="form-control"
								id="pass"
								name="pass"
							/>
						</div>
						<div class="mb-3 form-check">
							<input
								type="checkbox"
								class="form-check-input"
								id="exampleCheck1"
								name="exampleCheck1"
							/>
							<label class="form-check-label" for="exampleCheck1"
								>Соглашаетесь со всеми нашими условиями</label
							>
						</div>
						<button
							type="submit"
							name="btn_reg"
							id="btn_reg"
							class="btn btn-primary"
						>
							Отправить
						</button>
					</form>
				</div>
				<!-- class="row" -->
			</div>
			<!-- class="container"" -->
